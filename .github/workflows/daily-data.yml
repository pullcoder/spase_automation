name: Daily Data Update

on:
  schedule:
    - cron: "0 0 * * *"  # 매일 UTC 00:00 (한국 오전 9시)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NASA APOD + News + Groq AI 요약 생성
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node -e "
          const https = require('https');
          const http = require('http');
          const fs = require('fs');

          function request(options, body) {
            return new Promise((resolve, reject) => {
              const lib = options.hostname?.startsWith('http://') || options.port === 80 ? http : https;
              const req = lib.request(options, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function groq(prompt) {
            const body = JSON.stringify({
              model: 'llama-3.1-8b-instant',
              messages: [{ role: 'user', content: prompt }],
              max_tokens: 300
            });
            const res = await request({
              hostname: 'api.groq.com',
              path: '/openai/v1/chat/completions',
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + process.env.GROQ_API_KEY,
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            }, body);
            const json = JSON.parse(res.body);
            return json.choices?.[0]?.message?.content ?? '';
          }

          async function fetchRSS(hostname, path) {
            try {
              const res = await request({ hostname, path, method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' } });
              const items = [];
              const matches = res.body.matchAll(/<item>[\s\S]*?<title[^>]*><!\[CDATA\[([^\]]+)\]\]><\/title>[\s\S]*?(?:<link>([^<]+)<\/link>|<guid[^>]*>([^<]+)<\/guid>)[\s\S]*?<\/item>/g);
              for (const m of matches) {
                items.push({ title: m[1].trim(), url: (m[2] || m[3] || '').trim() });
                if (items.length >= 5) break;
              }
              // CDATA 없는 형식도 처리
              if (items.length === 0) {
                const m2 = res.body.matchAll(/<item>[\s\S]*?<title>([^<]+)<\/title>[\s\S]*?<link>([^<]+)<\/link>[\s\S]*?<\/item>/g);
                for (const m of m2) {
                  items.push({ title: m[1].trim(), url: m[2].trim() });
                  if (items.length >= 5) break;
                }
              }
              return items;
            } catch (e) {
              console.log('RSS 실패:', hostname, e.message);
              return [];
            }
          }

          async function main() {
            // 1. NASA APOD
            const nasaRes = await request({
              hostname: 'api.nasa.gov',
              path: '/planetary/apod?api_key=' + process.env.NASA_API_KEY,
              method: 'GET'
            });
            const apod = JSON.parse(nasaRes.body);
            console.log('APOD:', apod.title);

            let apodSummary = '';
            try {
              apodSummary = await groq('NASA 오늘의 우주 사진 제목: ' + apod.title + '\n설명: ' + apod.explanation.substring(0, 500) + '\n\n위 내용을 한국어로 2-3문장으로 쉽게 요약해줘.');
              console.log('APOD AI 요약 완료');
            } catch (e) { console.log('APOD 요약 실패:', e.message); }

            // 2. 뉴스 RSS (BBC World + Technology)
            const [worldNews, techNews] = await Promise.all([
              fetchRSS('feeds.bbci.co.uk', '/news/world/rss.xml'),
              fetchRSS('feeds.bbci.co.uk', '/news/technology/rss.xml'),
            ]);

            const allNews = [
              ...worldNews.map(n => ({ ...n, source: 'BBC World' })),
              ...techNews.map(n => ({ ...n, source: 'BBC Tech' })),
            ].slice(0, 6);

            console.log('뉴스 수집:', allNews.length, '건');

            let newsDigest = '';
            if (allNews.length > 0) {
              try {
                const headlines = allNews.map((n, i) => (i+1) + '. ' + n.title).join('\n');
                newsDigest = await groq('오늘의 뉴스 헤드라인:\n' + headlines + '\n\n위 뉴스들을 한국어로 3-4문장으로 종합 요약해줘. 핵심 트렌드 중심으로.');
                console.log('뉴스 AI 요약 완료');
              } catch (e) { console.log('뉴스 요약 실패:', e.message); }
            }

            // 3. 저장
            fs.mkdirSync('public/data', { recursive: true });
            fs.writeFileSync('public/data/daily.json', JSON.stringify({
              updatedAt: new Date().toISOString(),
              apod: { ...apod, ai_summary: apodSummary },
              news: { items: allNews, ai_digest: newsDigest }
            }, null, 2));
            console.log('daily.json 저장 완료');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Commit & Push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add public/data/daily.json
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')"
          git push
